name: ree_social_media_app
description: "A new Flutter project."
publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.9.0


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  shared_preferences:
  flutter_screenutil: ^5.9.0
  flutter_svg:
  flutter_spinkit:
  flutter_otp_text_field:
  camera: ^0.11.2
  video_player: ^2.10.0
  path_provider:
  permission_handler: ^12.0.1
  flutter_sound: ^9.28.0
  flutter_contacts:
  image_picker: ^1.2.0
  mime: ^2.0.0
  flutter_html: ^3.0.0
  url_launcher: ^6.3.2
  socket_io_client: ^2.0.3
  uuid:
  gallery_saver_plus: ^3.2.9
  skeletonizer: ^2.1.0+1
  country_code_picker: ^3.4.1
  device_info_plus: ^12.1.0
  intl: ^0.20.2
  path: any
  http: any
  http_parser: any
  video_thumbnail: ^0.5.6
  



dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0


flutter:


  uses-material-design: true


  assets:
     - assets/icons/
     - assets/language/
     - assets/fonts/
     - assets/images/



  fonts:
     - family: OpenSans
       fonts:
         - asset: assets/fonts/OpenSans-Bold.ttf
         - asset: assets/fonts/OpenSans-ExtraBold.ttf
         - asset: assets/fonts/OpenSans-Light.ttf
         - asset: assets/fonts/OpenSans-Regular.ttf
         - asset: assets/fonts/OpenSans-Semibold.ttf

  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
